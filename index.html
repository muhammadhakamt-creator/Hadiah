<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DroidTrack Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; touch-action: manipulation; }
        .map-container { height: 50vh; width: 100%; border-radius: 20px 20px 0 0; }
        .btn-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
        }
    </style>
</head>
<body class="text-slate-200">

    <div class="flex flex-col h-screen">
        <!-- Area Peta (Admin View) -->
        <div class="relative flex-1">
            <iframe id="googleMap" class="w-full h-full border-none grayscale-[0.5]" 
                    src="about:blank" allowfullscreen></iframe>
            
            <!-- Overlay Info -->
            <div class="absolute top-4 left-4 right-4 bg-slate-900/90 backdrop-blur p-4 rounded-2xl border border-white/10 shadow-2xl">
                <h1 class="text-cyan-400 font-bold text-lg flex items-center">
                    <span class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-ping"></span>
                    LIVE MONITOR
                </h1>
                <div class="grid grid-cols-2 gap-2 mt-2 text-[10px] text-slate-400 font-mono">
                    <p>LAT: <span id="dispLat" class="text-white">-</span></p>
                    <p>LNG: <span id="dispLng" class="text-white">-</span></p>
                    <p class="col-span-2">ALAMAT: <span id="dispAddr" class="text-white truncate block">Menunggu data...</span></p>
                </div>
            </div>
        </div>

        <!-- Panel Kontrol (Target View) -->
        <div class="bg-slate-900 p-6 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-white/5">
            <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-6"></div>
            
            <div id="setupView">
                <h2 class="text-xl font-bold mb-2">Aktivasi Pelacak</h2>
                <p class="text-slate-400 text-sm mb-6">Izinkan akses lokasi untuk memulai sinkronisasi koordinat ke server cloud.</p>
                
                <button onclick="activateGPS()" class="btn-pulse w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black py-4 rounded-2xl transition-all active:scale-95 shadow-lg shadow-cyan-500/20">
                    MULAI PELACAKAN SEKARANG
                </button>
            </div>

            <div id="activeView" class="hidden">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Status Sinyal</p>
                        <p class="text-emerald-400 font-bold">TERKONEKSI & AKTIF</p>
                    </div>
                    <button onclick="location.reload()" class="bg-slate-800 p-3 rounded-xl text-xs">BERHENTI</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // MASUKKAN CONFIG FIREBASE ANDA DI SINI
        const firebaseConfig = {
            apiKey: "",
            authDomain: "project-id.firebaseapp.com",
            projectId: "project-id",
            storageBucket: "project-id.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abcd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const deviceId = "android_user_1"; // Anda bisa buat ini dinamis nanti

        window.activateGPS = function() {
            if (!navigator.geolocation) {
                alert("Browser Anda tidak mendukung GPS.");
                return;
            }

            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('activeView').classList.remove('hidden');

            navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude, accuracy } = pos.coords;
                
                // 1. Simpan ke Firebase
                await setDoc(doc(db, "trackers", deviceId), {
                    lat: latitude,
                    lng: longitude,
                    time: Date.now(),
                    acc: accuracy
                });

                // 2. Update UI (untuk Admin/Monitor)
                updateMonitor(latitude, longitude);

            }, (err) => {
                alert("Akses GPS ditolak. Silakan buka Pengaturan Android > Aplikasi > Chrome > Izin > Lokasi.");
            }, { 
                enableHighAccuracy: true,
                maximumAge: 0 
            });
        };

        function updateMonitor(lat, lng) {
            document.getElementById('dispLat').innerText = lat.toFixed(6);
            document.getElementById('dispLng').innerText = lng.toFixed(6);
            
            // Update Google Maps View
            const mapUrl = `https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed`;
            document.getElementById('googleMap').src = mapUrl;

            // Optional: Gunakan API gratis untuk nama tempat
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('dispAddr').innerText = data.display_name;
                });
        }

        // Jalankan listener otomatis untuk Admin
        onSnapshot(doc(db, "trackers", deviceId), (snapshot) => {
            if(snapshot.exists()) {
                const data = snapshot.data();
                updateMonitor(data.lat, data.lng);
            }
        });
    </script>
</body>
</html>
